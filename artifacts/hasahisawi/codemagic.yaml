workflows:
  android-release:
    name: Android Release AAB → Google Play
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22.x
      android_signing:
        - hasahisawi_release
      groups:
        - hasahisawi_firebase
      vars:
        PACKAGE_NAME: com.almhbob.hasahisawi
        EXPO_PUBLIC_DOMAIN: hasahisawi.vercel.app
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.npm
    scripts:
      - name: Install pnpm
        script: npm install -g pnpm

      - name: Install dependencies
        script: pnpm install --frozen-lockfile

      - name: Expo Prebuild (Android)
        working_directory: artifacts/hasahisawi
        script: |
          export EXPO_PUBLIC_DOMAIN=hasahisawi.vercel.app
          export EXPO_PUBLIC_FIREBASE_API_KEY=$EXPO_PUBLIC_FIREBASE_API_KEY
          export EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=$EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN
          export EXPO_PUBLIC_FIREBASE_PROJECT_ID=$EXPO_PUBLIC_FIREBASE_PROJECT_ID
          export EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=$EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET
          export EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
          export EXPO_PUBLIC_FIREBASE_APP_ID=$EXPO_PUBLIC_FIREBASE_APP_ID
          npx expo prebuild --platform android --clean

      - name: Inject signing config into build.gradle
        working_directory: artifacts/hasahisawi/android
        script: |
          cat > keystore.properties << EOF
          storeFile=$CM_KEYSTORE_PATH
          storePassword=$CM_KEYSTORE_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          keyPassword=$CM_KEY_PASSWORD
          EOF

          node -e "
          const fs = require('fs');
          const path = 'app/build.gradle';
          let c = fs.readFileSync(path, 'utf8');

          const header = \`def keystoreProps = new Properties()
          def ksPropFile = rootProject.file('keystore.properties')
          if (ksPropFile.exists()) { keystoreProps.load(new FileInputStream(ksPropFile)) }

          \`;

          if (!c.includes('keystoreProps')) c = header + c;

          if (!c.includes('signingConfigs')) {
            c = c.replace('android {', \`android {
              signingConfigs {
                  release {
                      storeFile keystoreProps['storeFile'] ? file(keystoreProps['storeFile']) : null
                      storePassword keystoreProps['storePassword']
                      keyAlias keystoreProps['keyAlias']
                      keyPassword keystoreProps['keyPassword']
                  }
              }\`);
          }

          if (!c.includes('signingConfig signingConfigs.release')) {
            c = c.replace(/buildTypes\s*\{([^}]*release\s*\{)/, m => m + '\n            signingConfig signingConfigs.release');
          }

          fs.writeFileSync(path, c);
          console.log('build.gradle patched with signing config');
          "

      - name: Build Android release AAB
        working_directory: artifacts/hasahisawi/android
        script: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            --no-daemon

    artifacts:
      - artifacts/hasahisawi/android/app/build/outputs/bundle/release/*.aab

    publishing:
      email:
        recipients:
          - almhbob2026@gmail.com
        notify:
          success: true
          failure: true
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: false
