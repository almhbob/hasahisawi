kind = "mobile"
previewPath = "/"
title = "حصاحيصاوي"
version = "1.0.0"
id = "artifacts/hasahisawi"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 20706
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hasahisawi run dev"

[services.env]
PORT = "20706"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hasahisawi", "run", "build"]
run = ["pnpm", "--filter", "@workspace/hasahisawi", "run", "serve"]
