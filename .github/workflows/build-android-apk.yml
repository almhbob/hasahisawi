name: Build Android Release APK and AAB

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Android project
        working-directory: artifacts/hasahisawi
        env:
          CI: true
          EXPO_NO_TELEMETRY: 1
          EXPO_PUBLIC_API_URL: https://hasahisawi.onrender.com
          EXPO_PUBLIC_DOMAIN: hasahisawi.onrender.com
        run: pnpm exec expo prebuild --platform android --clean --non-interactive --no-install

      - name: Build standalone release APK and AAB
        working-directory: artifacts/hasahisawi/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Prepare Android artifacts
        run: |
          mkdir -p release
          VERSION=$(node -e "console.log(require('./artifacts/hasahisawi/app.json').expo.version)")
          VERSION_CODE=$(node -e "console.log(require('./artifacts/hasahisawi/app.json').expo.android.versionCode)")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          cp artifacts/hasahisawi/android/app/build/outputs/apk/release/app-release.apk release/hasahisawi-v${VERSION}-code${VERSION_CODE}.apk
          cp artifacts/hasahisawi/android/app/build/outputs/bundle/release/app-release.aab release/hasahisawi-v${VERSION}-code${VERSION_CODE}.aab
          ls -lh release

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasahisawi-release-apk
          path: release/*.apk
          retention-days: 30

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasahisawi-release-aab
          path: release/*.aab
          retention-days: 30

      - name: Publish GitHub Release with permanent links
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-v${{ env.VERSION }}-${{ env.VERSION_CODE }}-${{ github.run_number }}
          name: حصاحيصاوي Android v${{ env.VERSION }} build ${{ env.VERSION_CODE }}
          body: |
            إصدار Android تلقائي لتطبيق حصاحيصاوي.

            الملفات:
            - APK للتثبيت المباشر.
            - AAB للنشر في Google Play.
          files: |
            release/*.apk
            release/*.aab
          make_latest: true
