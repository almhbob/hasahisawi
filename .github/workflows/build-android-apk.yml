name: Build Android Release APK and AAB

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-android-release:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Android project
        working-directory: artifacts/hasahisawi
        env:
          CI: true
          EXPO_NO_TELEMETRY: 1
          EXPO_PUBLIC_API_URL: https://hasahisawi.onrender.com
          EXPO_PUBLIC_DOMAIN: hasahisawi.onrender.com
        run: pnpm exec expo prebuild --platform android --clean --non-interactive --no-install

      - name: Build standalone release APK and AAB
        working-directory: artifacts/hasahisawi/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Prepare Android artifacts
        run: |
          mkdir -p release
          cp artifacts/hasahisawi/android/app/build/outputs/apk/release/app-release.apk release/hasahisawi-release.apk
          cp artifacts/hasahisawi/android/app/build/outputs/bundle/release/app-release.aab release/hasahisawi-release.aab
          ls -lh release

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: hasahisawi-release-apk
          path: release/hasahisawi-release.apk
          retention-days: 14

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: hasahisawi-release-aab
          path: release/hasahisawi-release.aab
          retention-days: 14
