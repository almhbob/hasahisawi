name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Android project
        working-directory: artifacts/hasahisawi
        env:
          CI: true
          EXPO_NO_TELEMETRY: 1
        run: pnpm exec expo prebuild --platform android --clean --non-interactive --no-install

      - name: Build debug APK
        working-directory: artifacts/hasahisawi/android
        run: chmod +x ./gradlew && ./gradlew assembleDebug --no-daemon

      - name: Prepare APK
        run: mkdir -p release && cp artifacts/hasahisawi/android/app/build/outputs/apk/debug/app-debug.apk release/hasahisawi-preview.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hasahisawi-preview-apk
          path: release/hasahisawi-preview.apk
          retention-days: 14
