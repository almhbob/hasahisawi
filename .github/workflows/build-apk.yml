name: Build Android APK (Preview)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: false
        default: 'preview'
        type: choice
        options: [preview, production]
  workflow_run:
    workflows: ["Deploy Firebase Functions & Hosting"]
    types: [completed]
    branches: [main]

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: artifacts/hasahisawi

      - name: Build APK
        run: eas build --profile ${{ github.event.inputs.profile || 'preview' }} --platform android --non-interactive --no-wait
        working-directory: artifacts/hasahisawi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
