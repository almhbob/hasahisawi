name: Keep API Server Alive

on:
  schedule:
    # كل 5 دقائق — يمنع Render من النوم
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Render API
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Production API
        run: |
          echo "🏥 Pinging Hasahisawi Render API..."
          STATUS=$(curl -sf --max-time 20 https://hasahisawi.onrender.com/api/healthz | head -c 100)
          echo "✅ Render API: $STATUS"
        continue-on-error: true

      - name: Ping secondary endpoints
        run: |
          curl -sf --max-time 10 https://hasahisawi.onrender.com/api/transport/neighborhoods > /dev/null && echo "✅ transport OK" || echo "⚠️ transport failed"
          curl -sf --max-time 10 https://hasahisawi.onrender.com/api/prayer-settings > /dev/null && echo "✅ prayer OK" || echo "⚠️ prayer failed"
        continue-on-error: true
