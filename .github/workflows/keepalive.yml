name: Keep API Server Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping Render API
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Production API
        run: |
          echo "🏥 Pinging Hasahisawi Render API..."
          STATUS=$(curl -sf --max-time 20 https://hasahisawi.onrender.com/api/healthz | head -c 100)
          echo "✅ Render API: $STATUS"
        continue-on-error: true

      - name: Ping secondary endpoints
        run: |
          curl -sf --max-time 10 https://hasahisawi.onrender.com/api/prayer-times > /dev/null && echo "✅ prayer-times OK"
          curl -sf --max-time 10 https://hasahisawi.onrender.com/api/posts > /dev/null && echo "✅ posts OK"
        continue-on-error: true
