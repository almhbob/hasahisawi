name: Build Android AAB

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'artifacts/hasahisawi/**'
      - '.github/workflows/build-aab.yml'

jobs:
  build:
    name: Build AAB + APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Read app version from app.json
        id: app_version
        run: |
          VERSION=$(node -e "console.log(require('./artifacts/hasahisawi/app.json').expo.version)")
          VERSION_CODE=$(node -e "console.log(require('./artifacts/hasahisawi/app.json').expo.android.versionCode)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Building v$VERSION (versionCode: $VERSION_CODE)"

      - name: Get pnpm store
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install dependencies
        working-directory: artifacts/hasahisawi
        run: pnpm install --no-frozen-lockfile

      - name: TypeScript check (non-blocking for production artifact)
        working-directory: artifacts/hasahisawi
        run: pnpm run typecheck || true

      - name: Write .env for Firebase and API
        working-directory: artifacts/hasahisawi
        run: |
          cat > .env << EOF
          EXPO_PUBLIC_FIREBASE_API_KEY=AIzaSyC0o8hr3Dp0hgqKovIDUM0PSCbqgBABvx8
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=hasahisawi.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=hasahisawi
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=hasahisawi.firebasestorage.app
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=133656291161
          EXPO_PUBLIC_FIREBASE_APP_ID=1:133656291161:android:7d0a88a80d3be1af418e48
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID=G-8NDWWB1735
          EXPO_PUBLIC_DOMAIN=${{ secrets.API_DOMAIN }}
          EOF

      - name: Expo Prebuild
        working-directory: artifacts/hasahisawi
        run: pnpm exec expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Decode Keystore
        working-directory: artifacts/hasahisawi/android
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Build AAB + APK with Gradle
        working-directory: artifacts/hasahisawi/android
        run: |
          ./gradlew bundleRelease assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Package AAB + APK
        run: |
          mkdir -p release
          VERSION="${{ steps.app_version.outputs.version }}"
          VERSION_CODE="${{ steps.app_version.outputs.version_code }}"
          cp artifacts/hasahisawi/android/app/build/outputs/bundle/release/app-release.aab release/hasahisawi-v${VERSION}-code${VERSION_CODE}.aab
          APK_SRC=$(find artifacts/hasahisawi/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK_SRC" ]; then
            cp "$APK_SRC" release/hasahisawi-v${VERSION}-code${VERSION_CODE}.apk
          fi
          ls -lh release/

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasahisawi-v${{ steps.app_version.outputs.version }}-code${{ steps.app_version.outputs.version_code }}-aab
          path: release/hasahisawi-v${{ steps.app_version.outputs.version }}-code${{ steps.app_version.outputs.version_code }}.aab
          retention-days: 30

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasahisawi-v${{ steps.app_version.outputs.version }}-code${{ steps.app_version.outputs.version_code }}-apk
          path: release/hasahisawi-v${{ steps.app_version.outputs.version }}-code${{ steps.app_version.outputs.version_code }}.apk
          retention-days: 30
          if-no-files-found: warn
