name: Build Android AAB

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 5.5.6)'
        required: false
        default: '5.5.6'

jobs:
  build:
    name: Build AAB (Android App Bundle)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Write .env for Firebase and API
        run: |
          cat > .env << 'EOF'
          EXPO_PUBLIC_FIREBASE_API_KEY=AIzaSyC0o8hr3Dp0hgqKovIDUM0PSCbqgBABvx8
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=hasahisawi.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=hasahisawi
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=hasahisawi.firebasestorage.app
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=133656291161
          EXPO_PUBLIC_FIREBASE_APP_ID=1:133656291161:web:7d0a88a80d3be1af418e48
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID=G-8NDWWB1735
          EXPO_PUBLIC_DOMAIN=${{ secrets.API_DOMAIN }}
          EOF

      - name: Expo Prebuild (generate Android native code)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Decode Keystore
        working-directory: android
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          echo "Keystore SHA1:"
          keytool -list -v -keystore release.keystore \
            -alias ${{ secrets.KEY_ALIAS }} \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" 2>/dev/null | grep SHA1 | head -1

      - name: Build AAB with Gradle
        working-directory: android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Rename AAB
        run: |
          mkdir -p release
          cp android/app/build/outputs/bundle/release/app-release.aab \
             release/hasahisawi-v${{ github.event.inputs.version }}.aab

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasahisawi-v${{ github.event.inputs.version }}-aab
          path: release/hasahisawi-v${{ github.event.inputs.version }}.aab
          retention-days: 30
