name: Build Android AAB

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 2.2.8)'
        required: false
        default: '2.2.8'

jobs:
  build:
    name: Build AAB (Android App Bundle)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store
        id: pnpm-cache
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.dir }}
          key: pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write .env for Firebase and API
        working-directory: artifacts/hasahisawi
        run: |
          cat > .env << EOF
          EXPO_PUBLIC_FIREBASE_API_KEY=AIzaSyC0o8hr3Dp0hgqKovIDUM0PSCbqgBABvx8
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=hasahisawi.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=hasahisawi
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=hasahisawi.firebasestorage.app
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=133656291161
          EXPO_PUBLIC_FIREBASE_APP_ID=1:133656291161:web:7d0a88a80d3be1af418e48
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID=G-8NDWWB1735
          EXPO_PUBLIC_DOMAIN=${{ secrets.API_DOMAIN }}
          EOF

      - name: Expo Prebuild (generate Android native code)
        working-directory: artifacts/hasahisawi
        run: pnpm exec expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Decode Keystore
        working-directory: artifacts/hasahisawi/android
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Build AAB with Gradle
        working-directory: artifacts/hasahisawi/android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Rename AAB
        run: |
          mkdir -p release
          cp artifacts/hasahisawi/android/app/build/outputs/bundle/release/app-release.aab \
             release/hasahisawi-v${{ github.event.inputs.version }}.aab

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasahisawi-v${{ github.event.inputs.version }}-aab
          path: release/hasahisawi-v${{ github.event.inputs.version }}.aab
          retention-days: 30
