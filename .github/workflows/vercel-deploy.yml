name: Deploy to Vercel

on:
  push:
    branches: [master]
    paths-ignore:
      - 'attached_assets/**'

jobs:
  sync-main-and-deploy:
    name: Sync main branch → trigger Vercel Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Force-update main to match master
        run: |
          git config user.email "ci@hasahisawi.app"
          git config user.name "Hasahisawi CI"
          git push origin HEAD:main --force
          echo "✅ main synced with master — Vercel will deploy production"

      - name: Also trigger deploy hook (backup)
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          echo "Deploy hook response: $RESPONSE"
