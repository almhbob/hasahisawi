name: Deploy to Vercel

on:
  push:
    branches: [master]
    paths-ignore:
      - 'attached_assets/**'

jobs:
  deploy:
    name: Trigger Vercel Production Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        run: |
          RESPONSE=$(curl -s -X POST "https://api.vercel.com/v1/integrations/deploy/prj_jXYp7uk0HZuZXUu3vuiEXCm0xF2U/ltjqlh48pn")
          echo "Response: $RESPONSE"
          JOB_ID=$(echo "$RESPONSE" | node -e "const d=[];process.stdin.on('data',c=>d.push(c));process.stdin.on('end',()=>{console.log(JSON.parse(d.join('')).job?.id||'none');})" 2>/dev/null || echo "unknown")
          echo "✅ Vercel deploy triggered — Job: $JOB_ID"
