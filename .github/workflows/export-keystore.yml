name: Export Keystore
on:
  workflow_dispatch:
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Decode and verify keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          keytool -list -v -keystore keystore.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" 2>&1 | grep -E "SHA1|Alias|Owner"
          # Re-encode for artifact
          base64 -w0 keystore.jks > keystore_b64.txt
      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystore-export
          path: keystore_b64.txt
          retention-days: 1
