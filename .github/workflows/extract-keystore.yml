name: Extract Keystore
on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Decode and upload keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          echo "SHA1: $(keytool -list -keystore keystore.jks -storepass '${{ secrets.KEYSTORE_PASSWORD }}' 2>/dev/null | grep 'SHA1' | head -1)"
          echo "Alias: ${{ secrets.KEY_ALIAS }}"
          echo "KEYSTORE_B64=${{ secrets.KEYSTORE_BASE64 }}" >> $GITHUB_OUTPUT
      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystore
          path: keystore.jks
          retention-days: 1
