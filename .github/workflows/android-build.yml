name: Android Build & Publish

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build AAB + APK & Upload
    runs-on: ubuntu-latest
    timeout-minutes: 75

    env:
      GOOGLE_PLAY_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          echo "shamefully-hoist=true" >> .npmrc
          pnpm install --no-frozen-lockfile
          echo "node_modules hoisted ✓"

      - name: Create .env file with Firebase config
        working-directory: artifacts/hasahisawi
        run: |
          cat > .env << EOF
          EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          EXPO_PUBLIC_DOMAIN=d2426962-1502-4dea-a505-5a51fe17e30a-00-1thi5tsmtuw0o.sisko.replit.dev
          EOF

      - name: Expo prebuild
        working-directory: artifacts/hasahisawi
        env:
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          EXPO_PUBLIC_DOMAIN: d2426962-1502-4dea-a505-5a51fe17e30a-00-1thi5tsmtuw0o.sisko.replit.dev
          EXPO_NO_GIT_STATUS: '1'
        run: pnpm exec expo prebuild --platform android --clean --no-install

      - name: Decode keystore (KEYSTORE_BASE64)
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > artifacts/hasahisawi/android/app/hasahisawi-release.keystore
          echo "=== Verifying keystore ==="
          keytool -list -keystore artifacts/hasahisawi/android/app/hasahisawi-release.keystore \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.ANDROID_KEY_ALIAS }}" 2>&1 | grep -iE "SHA1|SHA256|fingerprint"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('artifacts/hasahisawi/android/**/*.gradle*', 'artifacts/hasahisawi/android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build release AAB
        env:
          NODE_ENV: production
          NODE_PATH: ${{ github.workspace }}/node_modules:${{ github.workspace }}/artifacts/hasahisawi/node_modules
          KEYSTORE_PATH: ${{ github.workspace }}/artifacts/hasahisawi/android/app/hasahisawi-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          EXPO_PROJECT_ROOT: ${{ github.workspace }}/artifacts/hasahisawi
          EXPO_PUBLIC_FIREBASE_API_KEY: AIzaSyC0o8hr3Dp0hgqKovIDUM0PSCbqgBABvx8
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: hasahisawi.firebaseapp.com
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: hasahisawi
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: hasahisawi.firebasestorage.app
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "133656291161"
          EXPO_PUBLIC_FIREBASE_APP_ID: 1:133656291161:web:7d0a88a80d3be1af418e48
          EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: G-8NDWWB1735
          EXPO_PUBLIC_DOMAIN: d2426962-1502-4dea-a505-5a51fe17e30a-00-1thi5tsmtuw0o.sisko.replit.dev
        run: |
          chmod +x artifacts/hasahisawi/android/gradlew
          cd artifacts/hasahisawi/android
          ./gradlew bundleRelease \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Convert AAB to Universal APK (bundletool)
        run: |
          AAB_PATH="artifacts/hasahisawi/android/app/build/outputs/bundle/release/app-release.aab"
          KEYSTORE_PATH="${{ github.workspace }}/artifacts/hasahisawi/android/app/hasahisawi-release.keystore"
          curl -sL "https://github.com/google/bundletool/releases/download/1.17.2/bundletool-all-1.17.2.jar" \
            -o /tmp/bundletool.jar
          java -jar /tmp/bundletool.jar build-apks \
            --bundle="$AAB_PATH" \
            --output=/tmp/hasahisawi-release.apks \
            --mode=universal \
            --ks="$KEYSTORE_PATH" \
            --ks-pass="pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --ks-key-alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            --key-pass="pass:${{ secrets.ANDROID_KEY_PASSWORD }}"
          cd /tmp && unzip -p hasahisawi-release.apks universal.apk > hasahisawi-release.apk
          echo "APK size: $(du -sh /tmp/hasahisawi-release.apk | cut -f1)"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasahisawi-release-${{ github.run_number }}-aab
          path: artifacts/hasahisawi/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasahisawi-release-${{ github.run_number }}-apk
          path: /tmp/hasahisawi-release.apk
          retention-days: 30

      - name: Get app version
        id: version
        run: |
          VERSION=$(node -e "const p=require('./artifacts/hasahisawi/package.json'); console.log(p.version || '1.0.0')")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with APK + AAB
        uses: ncipollo/release-action@v1
        with:
          tag: "v${{ steps.version.outputs.version }}-build${{ github.run_number }}"
          name: "حصاحيصاوي v${{ steps.version.outputs.version }} (Build #${{ github.run_number }})"
          body: |
            ## تثبيت التطبيق مباشرة على الهاتف

            | الملف | الاستخدام |
            |-------|-----------|
            | **APK** | تثبيت مباشر على الجهاز |
            | **AAB** | رفع على Google Play |

            ### طريقة تثبيت APK:
            1. حمّل ملف `hasahisawi-release.apk`
            2. افتح الإعدادات ← الأمان ← السماح بمصادر غير معروفة
            3. افتح الملف وثبّت التطبيق

            ---
            **Build:** #${{ github.run_number }} | **Branch:** master
          artifacts: "/tmp/hasahisawi-release.apk,artifacts/hasahisawi/android/app/build/outputs/bundle/release/app-release.aab"
          artifactContentType: "application/octet-stream"
          allowUpdates: true
          removeArtifacts: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Google Play (Internal track — draft)
        if: env.GOOGLE_PLAY_JSON != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.almhbob.hasahisawi
          releaseFiles: artifacts/hasahisawi/android/app/build/outputs/bundle/release/app-release.aab
          track: production
          status: draft
          whatsNewDirectory: .github/whatsnew

      - name: Cleanup
        if: always()
        run: |
          rm -f artifacts/hasahisawi/android/app/hasahisawi-release.keystore
          rm -f artifacts/hasahisawi/.env
