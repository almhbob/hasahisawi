name: Android Build

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build Android AAB
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Expo prebuild
        working-directory: artifacts/hasahisawi
        env:
          EXPO_PUBLIC_DOMAIN: ${{ secrets.EXPO_PUBLIC_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_NO_GIT_STATUS: '1'
        run: |
          pnpm exec expo prebuild --platform android --clean --no-install

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > artifacts/hasahisawi/android/app/hasahisawi-release.keystore

      - name: Write keystore.properties
        run: |
          printf 'storeFile=hasahisawi-release.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            '${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' \
            '${{ secrets.ANDROID_KEY_ALIAS }}' \
            '${{ secrets.ANDROID_KEY_PASSWORD }}' \
            > artifacts/hasahisawi/android/keystore.properties

      - name: Patch build.gradle for signing
        working-directory: artifacts/hasahisawi/android
        run: |
          node -e "
            const fs = require('fs');
            const file = 'app/build.gradle';
            let c = fs.readFileSync(file, 'utf8');
            const header = 'def keystoreProps = new Properties()\ndef ksPropFile = rootProject.file(\"keystore.properties\")\nif (ksPropFile.exists()) { keystoreProps.load(new FileInputStream(ksPropFile)) }\n\n';
            if (!c.includes('keystoreProps')) c = header + c;
            if (!c.includes('signingConfigs')) {
              c = c.replace('android {', 'android {\n    signingConfigs {\n        release {\n            storeFile keystoreProps[\"storeFile\"] ? file(keystoreProps[\"storeFile\"]) : null\n            storePassword keystoreProps[\"storePassword\"]\n            keyAlias keystoreProps[\"keyAlias\"]\n            keyPassword keystoreProps[\"keyPassword\"]\n        }\n    }');
            }
            if (!c.includes('signingConfig signingConfigs.release')) {
              c = c.replace(/buildTypes\s*\{([\s\S]*?)release\s*\{/, function(m) { return m + '\n            signingConfig signingConfigs.release'; });
            }
            fs.writeFileSync(file, c);
            console.log('build.gradle patched successfully');
          "

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('artifacts/hasahisawi/android/**/*.gradle*', 'artifacts/hasahisawi/android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build AAB
        working-directory: artifacts/hasahisawi/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasahisawi-release-${{ github.run_number }}
          path: artifacts/hasahisawi/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Cleanup keystore
        if: always()
        run: |
          rm -f artifacts/hasahisawi/android/app/hasahisawi-release.keystore
          rm -f artifacts/hasahisawi/android/keystore.properties
